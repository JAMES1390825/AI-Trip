global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/trip-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: trip-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["trip-api:8080"]
