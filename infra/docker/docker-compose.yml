services:
  trip-api:
    image: golang:1.22
    container_name: trip-api
    working_dir: /workspace
    command: sh -lc "go run ./cmd/trip-api-go"
    volumes:
      - ../../apps/trip-api-go:/workspace
      - ../../tmp/data:/workspace/tmp/data
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-change-this-secret}
      BOOTSTRAP_CLIENT_SECRET: ${BOOTSTRAP_CLIENT_SECRET:-dev-bootstrap-secret}
      CORS_ALLOWED_ORIGIN_1: ${CORS_ALLOWED_ORIGIN_1:-http://localhost:5500}
      CORS_ALLOWED_ORIGIN_2: ${CORS_ALLOWED_ORIGIN_2:-http://127.0.0.1:5500}
      DATA_FILE: ${DATA_FILE:-tmp/data/trip-api-go-store.json}

  web-client:
    image: node:20
    container_name: trip-web-client
    working_dir: /workspace
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5500 --strictPort"
    volumes:
      - ../../apps/web-client:/workspace
      - web-client-node-modules:/workspace/node_modules
    ports:
      - "5500:5500"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - trip-api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trip-prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts:/etc/prometheus/alerts:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - trip-api
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trip-alertmanager
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: trip-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  grafana-data:
  web-client-node-modules:
